<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minas - Sobrosa Royal Casino</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/MinasTerrestres.css">
    <link rel="stylesheet" href="css/Estilos.css">

    <script type="module" src="js/Minas-game.js"></script>
</head>
<body>

    <nav class="navbar" style="position: relative; height: auto; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div class="container nav-content" style="padding: 15px 20px;">
            <div class="logo">
                <img src="./Imagens-Casino/SobrosaRoyalCasino.png" class="logo-img" alt="Sobrosa Logo" style="width: 100px; height: 100px;">
                <div class="logo-text">
                    <h1 style="font-size: 1.5rem;">SOBROSA ROYAL</h1>
                    <span>Minas • Terrestres</span>
                </div>
            </div>
            <div class="nav-actions">
                <div style="margin-right: 20px;">
                    <span style="color: var(--text-gray); font-size: 0.8rem;">Saldo:</span>
                    <span class="text-gold" style="font-weight: 700; font-size: 1.1rem;">€ <span id="userBalance">1000</span></span>
                </div>
                <a href="index.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Sair</a>
            </div>
        </div>
    </nav>

    <section class="game-section">
        <div class="container">
            <div class="mines-interface">
                
                <div class="mines-controls">
                    <h2 style="color: white; margin-bottom: 15px;"><i class="fa-solid fa-bomb text-primary"></i> Minas</h2>

                    <div class="control-group">
                        <label>Valor da Aposta</label>
                        <div class="input-wrapper">
                            <input type="number" id="betAmount" value="10" min="1">
                            <button class="btn-half" onclick="ajustarAposta(0.5)">½</button>
                            <button class="btn-double" onclick="ajustarAposta(2)">2x</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Tamanho do Campo</label>
                        <div class="size-selector">
                            <button class="size-btn" onclick="mudarTamanho(3)">3x3</button>
                            <button class="size-btn active" onclick="mudarTamanho(5)">5x5</button>
                            <button class="size-btn" onclick="mudarTamanho(7)">7x7</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Número de Minas</label>
                        <div class="mines-selector">
                            <button class="mine-btn active" onclick="setMinas(1)">1</button>
                            <button class="mine-btn" onclick="setMinas(3)">3</button>
                            <button class="mine-btn" onclick="setMinas(5)">5</button>
                            <button class="mine-btn" onclick="setMinas(10)">10</button>
                            
                        </div>
                    </div>

                    <div class="game-info">
                        <div class="info-row">
                            <span>Multiplicador:</span>
                            <span id="currentMultiplier" class="text-gold">1.00x</span>
                        </div>
                        <div class="info-row">
                            <span>Próximo Prémio:</span>
                            <span id="nextProfit" style="color:white; font-weight:bold;">€0.00</span>
                        </div>
                    </div>

                    <button id="actionButton" class="btn btn-primary btn-large">COMEÇAR JOGO</button>
                    <p id="gameMessage" style="text-align: center; font-weight: bold; min-height: 20px; margin-top:10px; font-size: 0.9rem;"></p>
                </div>

                <div class="mines-board-wrapper">
                    <div class="mines-grid" id="minesGrid">
                        </div>
                </div>

            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p style="text-align: center; color: #64748b;">&copy; 2025 Sobrosa Royal Casino. Jogue com responsabilidade.</p>
        </div>
    </footer>

</body>
</html>
