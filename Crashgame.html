<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Crash - Sobrosa Royal Casino</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/Estilos.css">
    <link rel="stylesheet" href="css/CrashGame.css">

    <script type="module" src="js/crash-game.js"></script>
    
</head>
<body>

    <nav class="navbar" style="position: relative; height: auto; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div class="container nav-content" style="padding: 15px 20px;">
            <div class="logo">
                <img src="./Imagens-Casino/SobrosaRoyalCasino.png" class="logo-img" alt="Sobrosa Logo" style="width: 100px; height: 100px;">
                <div class="logo-text">
                    <h1 style="font-size: 1.5rem;">SOBROSA ROYAL</h1>
                    <span>Space • Crash</span>
                </div>
            </div>
            <div class="nav-actions">
                <div style="margin-right: 20px;">
                    <span style="color: var(--text-gray); font-size: 0.8rem;">Saldo:</span>
                    <span class="text-gold" style="font-weight: 700; font-size: 1.1rem;">€ <span id="userBalance">1000</span></span>
                </div>
                <a href="index.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Sair</a>
            </div>
        </div>
    </nav>

    <div class="game-wrapper">
        
        <div class="control-panel">
            <div class="bet-input-group">
                <label>Valor da Aposta</label>
                <div class="bet-input-wrapper">
                    <input type="number" id="betAmount" value="10.00" min="1" step="1">
                    <i class="fa-solid fa-euro-sign currency-icon"></i>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn btn-outline" onclick="window.adjustBet(0.5)">1/2</button>
                <button class="btn btn-outline" onclick="window.adjustBet(2)">x2</button>
            </div>

            <div id="statusMessage" style="margin-top: 10px; min-height: 20px; color: var(--text-gray); font-size: 0.9rem; text-align: center;">
                A aguardar início...
            </div>

            <button id="actionBtn" class="btn btn-bet">
                APOSTAR
            </button>
        </div>

        <div class="graph-container">
            <div class="grid-bg"></div>
            
            <div class="history-bar" id="historyBar">
                </div>

            <div class="game-content">
                <div id="rocket" class="rocket-icon">
                    <i class="fa-solid fa-rocket"></i>
                </div>
                <div id="multiplier" class="multiplier-display">1.00x</div>
                <div id="winningsDisplay" style="font-size: 1.5rem; color: var(--gold); height: 30px; font-weight: 700;"></div>
            </div>
        </div>

    </div>

    </body>
</html>
